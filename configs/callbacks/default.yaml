defaults:
  - model_checkpoint
  - early_stopping
  - model_summary
  - rich_progress_bar
  - _self_

model_checkpoint:
  dirpath: ${paths.output_dir}/checkpoints
  filename: "RFlowAb_epoch_{epoch:03d}"
  monitor: "val/spearman"
  mode: "max"
  auto_insert_metric_name: False
  every_n_epochs: 10
  save_top_k: 1

early_stopping:
  monitor: "val/spearman"
  patience: 5
  mode: "max"

model_summary:
  max_depth: -1
