_target_: src.data.antibody_library_datamodule.AntibodyLibraryData

# Root directory that contains the master CSV and library_pdb_map file.
# Relative paths in master_csv and library_pdb_map are resolved against data_dir.
data_dir: /pub/absara/datasets/ASD

# Path to the master CSV (absolute, or relative to data_dir).
# Required columns: library_id, heavy_sequence, light_sequence,
#                   antigen_sequence, norm_affinity
master_csv: /pub/absara/datasets/ASD/csv/non_binary_affinity_unique/asd_full_align_norm.csv

# Path to a YAML or JSON file that maps library_id -> PDB path.
# Example YAML:
#   lib_001: /path/to/lib_001_wildtype.pdb
#   lib_002: structure/lib_002.pdb
library_pdb_map: /pub/absara/datasets/ASD/af3/af3_prediction_map.yaml

# Chain letters to encode and their order in the concatenated token sequence.
# Supported values: H (heavy_sequence), L (light_sequence), A (antigen_sequence).
# Omit L for nanobody / VHH libraries that have no light chain.
chain_order:
  - H
  - L
  - A

# Cross-validation split settings.
# If split_type is set, the column fold_{split_type}_5 is looked up in the CSV.
# Set split_type to null to use an automatic 80/20 random split per library.
split_type: null        # e.g. "random" to use fold_random_5 column
split_index: 0          # fold index used as the validation set (0-4)

# When True (default), the row with wild_type==True within each library_id
# group is used to supply heavy/light/antigen wildtype sequences for steering
# vectors and reference tokens.  If no wild_type row exists the code falls
# back to extracting sequences from the PDB.
# Set to False to always use PDB-derived sequences (original behaviour).
use_wild_type_row: True

# When True, each library's rows are pre-filtered to only those where
# modal_length==True before splitting and building labels.  If filtering
# removes all rows for a library that library is skipped with a warning.
# Defaults to False (no filtering).
filter_modal_length: False

# When True, each library's rows are pre-filtered to only those whose
# heavy/light/antigen sequence lengths match that library's resolved wildtype
# chain lengths before splitting and building labels.  If filtering removes
# all rows for a library that library is skipped with a warning.
# Defaults to False (no filtering).
filter_wild_type_length: False

# Minimum number of retained variants required for a library to be included.
# Libraries with fewer rows than this cutoff are skipped with a warning.
# Set to 0 to disable this filter.
min_variants_per_library: 0

# DataLoader settings
batch_size: 1
num_workers: 0
pin_memory: False
