_target_: src.models.RankFlow_module.RankFlow

optimizer:
  _target_: torch.optim.AdamW
  _partial_: True
  lr: 1e-4
  weight_decay: 0.005

scheduler:
  _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
  _partial_: True
  mode: min
  factor: 0.9
  patience: 10

# Backbone model: 'esm2' | 'esm1v' | 'mint'
model: mint

# MINT-specific: path to MINT checkpoint (only used when model='mint')
mint_checkpoint_path: /pub/absara/models/mint/mint.ckpt

# Structure encoder: 'esm-if1' | 'proteinmpnn'
structure_encoder: proteinmpnn

# ProteinMPNN-specific options (only used when structure_encoder='proteinmpnn')
proteinmpnn_checkpoint_path: /pub/absara/models/ProteinMPNN/vanilla_model_weights/v_48_030.pt
proteinmpnn_hidden_dim: 128

efm_beta: 1.0
steps_ref: 20
eta_ref: 0.02
t0_ref: 0.1
lambda_y: 0.5

# compile model for faster training with pytorch 2.0
compile: false
